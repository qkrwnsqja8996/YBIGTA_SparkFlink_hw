name: Build & Push Base Images to GHCR

on:
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.flink.base"
      - "docker/Dockerfile.spark.base"
      - "docker/spark-entrypoint.sh"
      - ".github/workflows/build-base-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-flink:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Flink base image (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.flink.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ env.OWNER }}/ybigta_spfl_hw-flink:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-spark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Spark base image (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.spark.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ env.OWNER }}/ybigta_spfl_hw-spark:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
