# -----------------------------------------------------------------------------
# TODO: Shuffle Partition
#
# groupBy/join을 실행하면 Spark는 같은 키의 데이터를 한 파티션으로 모아야 합니다.
# 이 과정이 셔플이고, 파티션 하나당 태스크 하나가 Executor에 할당됩니다.
# 태스크 하나를 실행할 때마다 스케줄링·직렬화·네트워크 비용이 발생하므로,
# 파티션이 클러스터 코어 수보다 지나치게 많으면 실제 연산보다 오버헤드가 더 커집니다.
#
# 이 클러스터의 Spark worker는 3대, 각 2코어입니다
# (docker-compose.yml: SPARK_WORKER_CORES=2 확인).
# → 동시에 실행할 수 있는 태스크: 3 × 2 = 6개
#
# 시나리오 04는 파티션 수가 너무 많을 때 실제로 어떤 일이 벌어지는지 보여줍니다.
# 클러스터 전체 코어 수의 1~2배 정도가 적절합니다.
#
# 작성 형식: 키와 값을 공백으로 구분합니다.
#
# spark.sql.shuffle.partitions
#   groupBy/join 시 생성되는 파티션 수입니다. 기본값은 200.
#   힌트: 6
#
# spark.default.parallelism
#   RDD 연산(map, filter 등)의 기본 병렬성입니다. shuffle.partitions와 맞춰주세요.
#   힌트: 6
# -----------------------------------------------------------------------------
spark.sql.shuffle.partitions    200
# spark.default.parallelism

