# -----------------------------------------------------------------------------
# TODO: Checkpointing
#
# Flink는 스트리밍 처리 중 집계값·세션 정보 같은 상태를 메모리에 들고 있습니다.
# 분산 시스템에서 노드 장애는 언제든 발생하고, 장애가 나면 메모리가 날아갑니다.
# 이를 대비해 Flink는 주기적으로 상태 전체를 외부 경로에 스냅샷으로 찍어둡니다.
# 장애 발생 시 가장 최근 스냅샷에서 복구합니다.
# 이 설정이 없으면 JobManager가 잡 제출 자체를 거부합니다.
#
# execution.checkpointing.interval
#   스냅샷을 얼마나 자주 찍을지 결정합니다. 단위는 ms.
#   너무 짧으면 스냅샷 오버헤드, 너무 길면 장애 시 그만큼 되돌아가야 합니다.
#   힌트: 10000
#
# execution.checkpointing.mode
#   장애 복구 후 레코드가 몇 번 처리되는지를 보장하는 수준입니다.
#   EXACTLY_ONCE  → 레코드가 정확히 한 번만 처리됩니다. 결제·금융처럼 중복이 치명적일 때.
#   AT_LEAST_ONCE → 중복 처리 가능하지만 더 가볍습니다. 로그 수집 등.
#   힌트: EXACTLY_ONCE
#
# state.checkpoints.dir
#   스냅샷을 저장할 경로입니다. docker-compose.yml을 보면 /data 볼륨이
#   모든 Flink 컨테이너에 마운트되어 있습니다. file:// 프리픽스가 필요합니다.
#   힌트: file:///data/flink-checkpoints
#
# state.backend
#   상태를 어디에 저장할지 결정합니다.
#   hashmap → JVM 힙 메모리에 저장. 빠르지만 상태가 메모리를 넘으면 OOM.
#   rocksdb → 디스크에 저장. 대용량에 유리하지만 느립니다.
#   이 과제의 데이터 규모라면 어느 쪽이 적합할까요?
#   힌트: hashmap
# -----------------------------------------------------------------------------
# execution.checkpointing.interval:
# execution.checkpointing.mode:
# state.checkpoints.dir:
# state.backend:

# -----------------------------------------------------------------------------
# TODO: 병렬성
#
# Flink는 잡을 여러 태스크로 나눠 TaskManager(TM)의 슬롯에 분배합니다.
# 슬롯은 TM이 동시에 실행할 수 있는 태스크 단위이며,
# 가용 슬롯 총합 = TM 수 × TM당 슬롯 수 입니다.
# parallelism.default가 이 총합을 넘으면 슬롯이 부족해서 잡이 PENDING 상태에서 멈춥니다.
#
# 이 클러스터의 TM은 3대입니다 (docker-compose.yml: flink-tm1, flink-tm2, flink-tm3).
# 각 TM의 메모리는 1728m입니다.
#
# taskmanager.numberOfTaskSlots
#   TM 1대가 동시에 실행할 수 있는 태스크 수입니다.
#   슬롯이 많을수록 TM 메모리를 더 잘게 나눠 쓰므로 OOM 위험이 올라갑니다.
#   힌트: 2
#
# parallelism.default
#   잡이 기본으로 몇 개의 병렬 태스크로 실행될지입니다.
#   TM 수(3) × numberOfTaskSlots 이하여야 슬롯이 부족하지 않습니다.
#   힌트: 3
# -----------------------------------------------------------------------------
# taskmanager.numberOfTaskSlots:
# parallelism.default:
