# -----------------------------------------------------------------------------
# TODO: Checkpointing — 이 설정이 없으면 Flink 잡이 시작되지 않습니다.
#
# Flink는 스트리밍 처리 중 주기적으로 상태(State) 스냅샷을 저장합니다.
# 장애가 나도 마지막 체크포인트부터 정확히 재처리할 수 있습니다.
#
# execution.checkpointing.interval  : 스냅샷을 몇 ms마다 찍을지
# execution.checkpointing.mode      : EXACTLY_ONCE or AT_LEAST_ONCE
# state.checkpoints.dir             : 스냅샷 저장 경로 (컨테이너 내부 경로)
# state.backend                     : 상태 저장 방식 (hashmap / rocksdb)
# -----------------------------------------------------------------------------
# execution.checkpointing.interval:
# execution.checkpointing.mode:
# state.checkpoints.dir:
# state.backend:

