#
# TaskManager가 3대 있고, 각 TM은 numberOfTaskSlots개의 슬롯을 가집니다.
# parallelism.default는 Flink 잡이 몇 개의 병렬 태스크로 실행될지 결정합니다.
# 병렬성이 높을수록 처리가 빠르지만, 가용 슬롯 수를 초과하면 잡이 시작되지 않습니다.
#
# taskmanager.numberOfTaskSlots  : TM 1대당 슬롯 수
# parallelism.default            : 잡의 기본 병렬성 (≤ TM수 × 슬롯수)
# -----------------------------------------------------------------------------
# taskmanager.numberOfTaskSlots:
# parallelism.default:
